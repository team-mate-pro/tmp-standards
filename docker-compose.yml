services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: bash
    volumes:
      - .:/app
    working_dir: /app
    entrypoint: []
    command: [ "bash", "-c", "composer install --no-ansi --no-interaction --no-progress && sleep infinity" ]
    tty: true
    stdin_open: true
